<svg version="1.0" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 2520 1574" preserveAspectRatio="xMidYMid meet">
  <defs>
    <style>
      text { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif; }
    </style>
  </defs>
  
  <!-- Ali Trans Group Logo with text -->
  <g>
    <!-- Hourglass Icon with sand animation concept -->
    <g transform="translate(400, 400)">
      <!-- Top rounded cap -->
      <path d="M 20 10 L 280 10 Q 300 10 300 30 L 300 100 Q 300 110 290 120 L 210 180 L 190 180 L 110 120 Q 100 110 100 100 L 100 30 Q 100 10 120 10 Z" 
            fill="none" stroke="white" stroke-width="20" stroke-linejoin="round" stroke-linecap="round"/>
      
      <!-- Sand falling visual -->
      <circle cx="160" cy="140" r="10" fill="#00D4FF" opacity="0.8"/>
      <circle cx="180" cy="160" r="9" fill="#00D4FF" opacity="0.7"/>
      <circle cx="140" cy="160" r="9" fill="#00D4FF" opacity="0.7"/>
      <circle cx="160" cy="180" r="8" fill="#00D4FF" opacity="0.6"/>
      
      <!-- Lower sand collection -->
      <g transform="translate(0, 250)">
        <path d="M 110 20 L 190 20 L 280 80 Q 300 100 300 120 L 300 200 Q 300 220 280 220 L 120 220 Q 100 220 100 200 L 100 120 Q 100 100 120 80 Z" 
              fill="none" stroke="white" stroke-width="20" stroke-linejoin="round" stroke-linecap="round"/>
        
        <!-- Sand in bottom -->
        <circle cx="160" cy="140" r="12" fill="#00D4FF" opacity="0.9"/>
        <circle cx="140" cy="160" r="11" fill="#00D4FF" opacity="0.8"/>
        <circle cx="180" cy="165" r="10" fill="#00D4FF" opacity="0.8"/>
        <circle cx="160" cy="185" r="9" fill="#00D4FF" opacity="0.7"/>
      </g>
    </g>
    
    <!-- Text: "Ali Trans Group" -->
    <text x="900" y="550" font-size="420" font-weight="900" fill="#00D4FF" letter-spacing="-12">
      Ali Trans
    </text>
    <text x="900" y="900" font-size="320" font-weight="700" fill="#00D4FF" letter-spacing="-8">
      Group
    </text>
    
    <!-- Subtitle -->
    <text x="1260" y="1100" font-size="100" font-weight="300" fill="#A0A0FF" letter-spacing="1" text-anchor="middle">
      время работает на вас
    </text>
  </g>
</svg>
